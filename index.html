<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div>Teachable Machine Image Model</div>
    <button type="button" onclick="init()">Start</button>
    <button type="button" onclick="switchCamera()">Alternar Câmera</button>
    <div style="margin-top: 20px; border: 1px dashed #ccc; padding: 10px;">
        <h3>Testar com Arquivo (Dataset)</h3>
        <input type="file" id="file-input" accept="image/*" onchange="predictFromFile()">
        <div id="file-preview-container" style="margin-top: 10px;"></div>
    </div>
    <div id="webcam-container"></div>
    <div id="label-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script
        src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="script.js">  </script>
</body>

</html>
